      - Messaging and Delivery: architecture/messaging-and-delivery.md
      - Storage and Memory: architecture/storage-and-memory.md
      - Security Boundaries: architecture/security-boundaries.md
      - Windows and Platform Support: architecture/windows-and-platforms.md
      - Layers:
