      - Agent Users: platform-learnings/entra-agent-users.md
      - MSAL and Agent IDs (Historical): platform-learnings/msal-entra-agent-ids.md
      - Teams Graph API: platform-learnings/teams-graph-api.md
      - Files Graph API: platform-learnings/files-graph-api.md
