site_name: "Entrabot Identity Research"
site_description: "Device-local agent identity with Microsoft Entra Agent ID and Agent User"
docs_dir: docs
site_dir: site
site_url: https://microsoft.github.io/entrabot/
repo_url: https://github.com/microsoft/entrabot
repo_name: microsoft/entrabot

theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - navigation.instant
    - search.suggest
    - search.highlight
    - content.code.copy

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.snippets:
      base_path: ["."]

nav:
  - Home: index.md
  - Project:
      - Current Status: project/status.md
      - Changelog: project/changelog.md
  - Getting Started:
